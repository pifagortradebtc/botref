<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#f7931a" />
  <title>Проверка реферала Bybit</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0d1117;
      --surface: #161b22;
      --border: #30363d;
      --text: #e6edf3;
      --text-muted: #8b949e;
      --accent: #f7931a;
      --accent-hover: #e08209;
      --success: #3fb950;
      --error: #f85149;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 16px;
      padding-bottom: calc(16px + env(safe-area-inset-bottom));
    }
    .container {
      max-width: 400px;
      margin: 0 auto;
    }
    h1 {
      font-size: 1.5rem;
      font-weight: 700;
      margin-bottom: 8px;
      color: var(--text);
    }
    .subtitle {
      font-size: 0.9rem;
      color: var(--text-muted);
      margin-bottom: 24px;
    }
    .form-group {
      margin-bottom: 20px;
    }
    label {
      display: block;
      font-size: 0.85rem;
      font-weight: 500;
      color: var(--text-muted);
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      padding: 14px 16px;
      font-size: 1rem;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      color: var(--text);
      outline: none;
      transition: border-color 0.2s;
    }
    input:focus {
      border-color: var(--accent);
    }
    input::placeholder {
      color: var(--text-muted);
    }
    .hint {
      font-size: 0.8rem;
      color: var(--text-muted);
      margin-top: 6px;
    }
    .btn {
      width: 100%;
      padding: 14px 20px;
      font-size: 1rem;
      font-weight: 600;
      font-family: inherit;
      background: var(--accent);
      color: #000;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      transition: background 0.2s;
    }
    .btn:hover {
      background: var(--accent-hover);
    }
    .btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }
    .result {
      margin-top: 24px;
      padding: 20px;
      border-radius: 12px;
      border: 1px solid var(--border);
      background: var(--surface);
      display: none;
    }
    .result.visible { display: block; }
    .result.success { border-color: var(--success); background: rgba(63, 185, 80, 0.1); }
    .result.error { border-color: var(--error); background: rgba(248, 81, 73, 0.1); }
    .result.neutral { border-color: var(--border); }
    .result-title {
      font-size: 1.1rem;
      font-weight: 600;
      margin-bottom: 8px;
    }
    .result.success .result-title { color: var(--success); }
    .result.error .result-title { color: var(--error); }
    .result-detail {
      font-size: 0.9rem;
      color: var(--text-muted);
      margin-top: 12px;
    }
    .result-detail dt { font-weight: 500; color: var(--text); }
    .result-detail dd { margin-left: 0; margin-top: 2px; }
    .loader {
      display: inline-block;
      width: 18px;
      height: 18px;
      border: 2px solid rgba(0,0,0,0.2);
      border-top-color: #000;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      vertical-align: middle;
      margin-right: 8px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="container">
    <h1>Проверка реферала</h1>
    <p class="subtitle">Введите WID пользователя Bybit, чтобы узнать, является ли он вашим рефералом</p>

    <form id="form">
      <div class="form-group">
        <label for="wid">WID (User ID) Bybit</label>
        <input
          type="text"
          id="wid"
          name="wid"
          placeholder="Например: 103895898"
          inputmode="numeric"
          pattern="[0-9]*"
          autocomplete="off"
          required
        />
        <p class="hint">WID можно найти в профиле пользователя на Bybit или в настройках аккаунта</p>
      </div>
      <button type="submit" class="btn" id="submitBtn">Проверить</button>
    </form>

    <div id="result" class="result" role="alert"></div>
  </div>

  <script>
    (function() {
      const form = document.getElementById('form');
      const widInput = document.getElementById('wid');
      const submitBtn = document.getElementById('submitBtn');
      const resultEl = document.getElementById('result');

      // Инициализация Telegram Web App
      if (window.Telegram && window.Telegram.WebApp) {
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();
        document.documentElement.style.setProperty('--accent', tg.themeParams.button_color || '#f7931a');
      }

      const apiBase = window.API_BASE || '/api';

      function showResult(type, title, message, details) {
        resultEl.className = 'result visible ' + type;
        resultEl.innerHTML = `
          <div class="result-title">${escapeHtml(title)}</div>
          <p>${escapeHtml(message)}</p>
          ${details ? `<dl class="result-detail">${details}</dl>` : ''}
        `;
      }

      function escapeHtml(s) {
        const div = document.createElement('div');
        div.textContent = s;
        return div.innerHTML;
      }

      form.addEventListener('submit', async (e) => {
        e.preventDefault();
        const wid = widInput.value.trim();
        if (!wid) return;

        submitBtn.disabled = true;
        submitBtn.innerHTML = '<span class="loader"></span>Проверка...';
        resultEl.className = 'result';
        resultEl.innerHTML = '';

        try {
          const res = await fetch(apiBase + '/check-referral', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ wid }),
          });
          const data = await res.json();

          if (!res.ok) {
            showResult('error', 'Ошибка', data.error || 'Не удалось выполнить проверку');
            return;
          }

          if (data.success && data.isReferral) {
            const u = data.userInfo || {};
            const details = `
              <dt>User ID</dt><dd>${escapeHtml(u.userId || wid)}</dd>
              ${u.registerTime ? `<dt>Дата регистрации</dt><dd>${escapeHtml(u.registerTime)}</dd>` : ''}
              ${u.tradeVol30Day ? `<dt>Объём за 30 дней (USDT)</dt><dd>${escapeHtml(u.tradeVol30Day)}</dd>` : ''}
              ${u.tradeVol365Day ? `<dt>Объём за год (USDT)</dt><dd>${escapeHtml(u.tradeVol365Day)}</dd>` : ''}
            `;
            showResult('success', 'Да, это ваш реферал!', data.message, details);
          } else if (data.success && !data.isReferral) {
            showResult('neutral', 'Нет', data.message);
          } else {
            showResult('error', 'Ошибка', data.error || data.message || 'Неизвестная ошибка');
          }
        } catch (err) {
          showResult('error', 'Ошибка', 'Не удалось подключиться к серверу. Проверьте интернет.');
        } finally {
          submitBtn.disabled = false;
          submitBtn.textContent = 'Проверить';
        }
      });
    })();
  </script>
</body>
</html>
